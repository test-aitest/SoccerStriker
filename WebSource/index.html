<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Soccer Striker</title>
  <style>
    * { margin: 0; padding: 0; outline: none !important; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #0A0A0A; overscroll-behavior: none;
      -webkit-user-select: none; -webkit-touch-callout: none; touch-action: none;
    }
    canvas { display: block; }
    #fallback-error {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      color: #ff6b6b; font-family: -apple-system, system-ui, sans-serif;
      font-size: 13px; text-align: center; white-space: pre-wrap;
      pointer-events: none; max-width: 80%;
    }
  </style>
</head>
<body>
  <div id="fallback-error"></div>
  <script type="module" src="./pitch.js"></script>
</body>
</html>
